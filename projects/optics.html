<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Ray Diagram Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        label {
            font-size: 16px;
            cursor: pointer;
            user-select: none;
        }

        input[type="radio"] {
            margin-right: 5px;
        }

        canvas {
            border: 1px solid #000000;
            cursor: grab;
        }
        
        canvas:active {
            cursor: grabbing;
        }

        .instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #666666;
        }

        #status-card {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #000000;
            width: 870px;
            display: flex;
            justify-content: space-between;
            font-size: 15px;
        }

        .status-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .status-group b {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            color: #555555;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label><input type="radio" name="optics" value="concave-mirror" checked> Concave Mirror</label>
        <label><input type="radio" name="optics" value="convex-mirror"> Convex Mirror</label>
        <label><input type="radio" name="optics" value="convex-lens"> Convex Lens</label>
        <label><input type="radio" name="optics" value="concave-lens"> Concave Lens</label>
    </div>

    <canvas id="opticsCanvas" width="900" height="450"></canvas>
    
    <div class="instructions">Click and drag the vertical <b>Object</b> arrow along the axis.</div>

    <div id="status-card">
        <div class="status-group">
            <b>Type & Orientation</b>
            <span id="nature-val">-</span>
        </div>
        <div class="status-group">
            <b>Size Relative to Object</b>
            <span id="size-val">-</span>
        </div>
        <div class="status-group">
            <b>Magnification (m)</b>
            <span id="mag-val">-</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        const radios = document.querySelectorAll('input[name="optics"]');
        
        const natureVal = document.getElementById('nature-val');
        const sizeVal = document.getElementById('size-val');
        const magVal = document.getElementById('mag-val');

        // Constants & Setup
        const originX = canvas.width / 2;
        const originY = canvas.height / 2;
        const fLength = 120; 
        
        // State variables
        let currentOptics = 'concave-mirror';
        let objectX = originX - 180; 
        const objectHeight = 60;     
        let isDragging = false;

        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentOptics = e.target.value;
                if (currentOptics.includes('mirror') && objectX >= originX) {
                    objectX = originX - 100;
                }
                draw();
            });
        });

        function getMouseX(e) {
            const rect = canvas.getBoundingClientRect();
            return e.clientX - rect.left;
        }

        canvas.addEventListener('mousedown', (e) => {
            const mouseX = getMouseX(e);
            if (Math.abs(mouseX - objectX) < 25) {
                isDragging = true;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            let mouseX = getMouseX(e);
            
            if (mouseX > originX - 10) mouseX = originX - 10;
            
            if (mouseX < 20) mouseX = 20;
            if (mouseX > canvas.width - 20) mouseX = canvas.width - 20;
            
            if (Math.abs(mouseX - originX) < 5) {
                mouseX = mouseX < originX ? originX - 5 : originX + 5;
            }

            // Avoid dividing by exactly focal length to prevent infinite projection values
            if (currentOptics === 'concave-mirror' && Math.abs((originX - mouseX) - fLength) < 3) {
                mouseX = (originX - mouseX) < fLength ? originX - fLength + 3 : originX - fLength - 3;
            }
            if (currentOptics === 'convex-lens' && Math.abs((originX - mouseX) - fLength) < 3) {
                mouseX = (originX - mouseX) < fLength ? originX - fLength + 3 : originX - fLength - 3;
            }

            objectX = mouseX;
            draw();
        });

        function drawArrow(x, y, height, label, isVirtual = false) {
            ctx.save();
            ctx.lineWidth = 2;
            if (isVirtual) {
                ctx.setLineDash([4, 4]);
            }
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - height);
            ctx.stroke();

            // Arrowhead
            const arrowSize = 6;
            const direction = height > 0 ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(x, y - height);
            ctx.lineTo(x - arrowSize, y - height + arrowSize * direction);
            ctx.lineTo(x + arrowSize, y - height + arrowSize * direction);
            ctx.fillStyle = '#000000';
            ctx.fill();

            // Label
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#000000';
            ctx.fillText(label, x - 18, y - height - (10 * direction));
            ctx.restore();
        }

        function drawDashedLine(x1, y1, x2, y2) {
            ctx.save();
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.restore();
        }

        function drawMirrorHatching(cx, cy, radius, startAngle, endAngle, facingLeft) {
            ctx.save();
            ctx.lineWidth = 1;
            const steps = 25;
            const angleDelta = (endAngle - startAngle) / steps;
            const hatchLength = 8;

            for(let i = 0; i <= steps; i++) {
                let angle = startAngle + (i * angleDelta);
                let x = cx + radius * Math.cos(angle);
                let y = cy + radius * Math.sin(angle);
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                let factor = facingLeft ? 1 : -1;
                ctx.lineTo(x + Math.cos(angle + 0.5) * hatchLength * factor, y + Math.sin(angle + 0.5) * hatchLength * factor);
                ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#000000';

            // 1. Principal Axis
            ctx.beginPath();
            ctx.moveTo(0, originY);
            ctx.lineTo(canvas.width, originY);
            ctx.stroke();

            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#000000';
            ctx.fillText('P', originX - 15, originY + 20);

            let fLeftX = originX - fLength;
            let fRightX = originX + fLength;
            let cLeftX = originX - (2 * fLength);

            ctx.beginPath();
            ctx.arc(fLeftX, originY, 3, 0, 2 * Math.PI);
            ctx.arc(fRightX, originY, 3, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillText('F', fLeftX - 4, originY + 20);
            ctx.fillText('F', fRightX - 4, originY + 20);

            if (currentOptics.includes('mirror')) {
                ctx.beginPath();
                ctx.arc(cLeftX, originY, 3, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillText('C', cLeftX - 4, originY + 20);
            }

            // 2. Render Optical Element
            ctx.beginPath();
            if (currentOptics === 'concave-mirror') {
                ctx.arc(originX - 400, originY, 400, -0.3, 0.3);
                ctx.stroke();
                drawMirrorHatching(originX - 400, originY, 400, -0.3, 0.3, true);
            } else if (currentOptics === 'convex-mirror') {
                ctx.arc(originX + 400, originY, 400, Math.PI - 0.3, Math.PI + 0.3);
                ctx.stroke();
                drawMirrorHatching(originX + 400, originY, 400, Math.PI - 0.3, Math.PI + 0.3, false);
            } else if (currentOptics === 'convex-lens') {
                ctx.save();
                ctx.beginPath();
                // Left arc (facing right)
                ctx.arc(originX - 105, originY, 120, -0.55, 0.55);
                // Right arc (facing left)
                ctx.arc(originX + 105, originY, 120, Math.PI - 0.55, Math.PI + 0.55);
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            } else if (currentOptics === 'concave-lens') {
                ctx.moveTo(originX - 15, originY - 120);
                ctx.lineTo(originX + 15, originY - 120);
                ctx.quadraticCurveTo(originX, originY, originX + 15, originY + 120);
                ctx.lineTo(originX - 15, originY + 120);
                ctx.quadraticCurveTo(originX, originY, originX - 15, originY - 120);
                ctx.stroke();
            }

            // 3. Draw Object
            const objH = objectHeight;
            const objX = objectX;
            drawArrow(objX, originY, objH, 'Object');

            // 4. Physics Computation
            const u = objX - originX; 
            let v = 0;               
            let imgH = 0;            
            let f = fLength;
            let m = 0;

            if (currentOptics === 'concave-mirror') {
                f = -fLength; 
                v = 1 / ((1 / f) - (1 / u));
                m = - (v / u);
                imgH = m * objH;
                const imgX = originX + v;

                // Incident parallel ray
                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY - objH);
                ctx.stroke();

                if (v < 0) { // Real image side
                    ctx.beginPath();
                    ctx.moveTo(originX, originY - objH);
                    ctx.lineTo(imgX, originY - imgH);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(objX, originY - objH);
                    ctx.lineTo(originX, originY);
                    ctx.lineTo(imgX, originY - imgH);
                    ctx.stroke();
                } else { // Virtual image side
                    let slope1 = ((originY - imgH) - (originY - objH)) / (imgX - originX);
                    ctx.beginPath();
                    ctx.moveTo(originX, originY - objH);
                    ctx.lineTo(0, (originY - objH) - slope1 * originX);
                    ctx.stroke();
                    drawDashedLine(originX, originY - objH, imgX, originY - imgH);

                    let slope2 = ((originY - imgH) - originY) / (imgX - originX);
                    ctx.beginPath();
                    ctx.moveTo(objX, originY - objH);
                    ctx.lineTo(originX, originY);
                    ctx.lineTo(0, originY - slope2 * originX);
                    ctx.stroke();
                    drawDashedLine(originX, originY, imgX, originY - imgH);
                }
                drawArrow(imgX, originY, imgH, 'Image', v > 0);

            } else if (currentOptics === 'convex-mirror') {
                f = fLength; 
                v = 1 / ((1 / f) - (1 / u));
                m = - (v / u);
                imgH = m * objH;
                const imgX = originX + v;

                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY - objH);
                ctx.stroke();

                // Dynamically changing reflected ray pointing away from virtual focus
                let slope1 = ((originY - objH) - originY) / (originX - fRightX);
                ctx.beginPath();
                ctx.moveTo(originX, originY - objH);
                ctx.lineTo(0, (originY - objH) - slope1 * originX);
                ctx.stroke();
                drawDashedLine(originX, originY - objH, imgX, originY - imgH);

                // Dynamically changing pole bounce ray path
                let slope2 = ((originY - imgH) - originY) / (imgX - originX);
                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY);
                ctx.lineTo(0, originY - slope2 * originX);
                ctx.stroke();
                drawDashedLine(originX, originY, imgX, originY - imgH);

                drawArrow(imgX, originY, imgH, 'Image', true);

            } else if (currentOptics === 'convex-lens') {
                f = fLength; 
                v = 1 / ((1 / f) + (1 / u));
                m = (v / u);
                imgH = m * objH;
                const imgX = originX + v;

                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY - objH);
                ctx.stroke();

                if (v > 0) { // Real focus space
                    ctx.beginPath();
                    ctx.moveTo(originX, originY - objH);
                    ctx.lineTo(imgX, originY - imgH);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(objX, originY - objH);
                    ctx.lineTo(imgX, originY - imgH);
                    ctx.stroke();
                } else { // Virtual focus setup (Object between F & P)
                    let slope1 = ((originY - imgH) - (originY - objH)) / (imgX - originX);
                    ctx.beginPath();
                    ctx.moveTo(originX, originY - objH);
                    ctx.lineTo(canvas.width, (originY - objH) + slope1 * (canvas.width - originX));
                    ctx.stroke();
                    drawDashedLine(originX, originY - objH, imgX, originY - imgH);

                    let slope2 = ((originY - imgH) - originY) / (imgX - originX);
                    ctx.beginPath();
                    ctx.moveTo(objX, originY - objH);
                    ctx.lineTo(originX, originY);
                    ctx.lineTo(canvas.width, originY + slope2 * (canvas.width - originX));
                    ctx.stroke();
                    drawDashedLine(originX, originY, imgX, originY - imgH);
                }
                drawArrow(imgX, originY, imgH, 'Image', v < 0);

            } else if (currentOptics === 'concave-lens') {
                f = -fLength;
                v = 1 / ((1 / f) + (1 / u));
                m = (v / u);
                imgH = m * objH;
                const imgX = originX + v;

                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY - objH);
                ctx.stroke();

                // Dynamic refracted ray trajectory diverging away relative to image height point
                let slope1 = ((originY - imgH) - (originY - objH)) / (imgX - originX);
                ctx.beginPath();
                ctx.moveTo(originX, originY - objH);
                ctx.lineTo(canvas.width, (originY - objH) + slope1 * (canvas.width - originX));
                ctx.stroke();
                drawDashedLine(originX, originY - objH, imgX, originY - imgH);

                // Central optical ray line
                let slope2 = ((originY - imgH) - originY) / (imgX - originX);
                ctx.beginPath();
                ctx.moveTo(objX, originY - objH);
                ctx.lineTo(originX, originY);
                ctx.lineTo(canvas.width, originY + slope2 * (canvas.width - originX));
                ctx.stroke();
                drawDashedLine(originX, originY, imgX, originY - imgH);

                drawArrow(imgX, originY, imgH, 'Image', true);
            }

            // 5. Update UI Metrics Panel
            let natureStr = m < 0 ? "Real & Inverted" : "Virtual & Erect";
            let sizeStr = Math.abs(m) > 1.05 ? "Enlarged" : Math.abs(m) < 0.95 ? "Diminished" : "Same Size";
            
            natureVal.textContent = natureStr;
            sizeVal.textContent = sizeStr;
            magVal.textContent = `${m > 0 ? '+' : ''}${m.toFixed(2)}`;
        }

        draw();
    </script>
</body>
</html>
